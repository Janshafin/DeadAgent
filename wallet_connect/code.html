<div class="absolute bottom-0 right-0 w-4 h-4 border-b border-r border-primary-container/50"></div>

<header class="flex flex-col items-center text-center gap-6">
<div class="font-title-sm text-title-sm text-primary uppercase tracking-[0.3em]">
                    Deadagent Protocol
                </div>
<h1 class="font-headline-md text-headline-md text-on-surface">
                    Initialize Vault Connection
                </h1>
<p class="font-body-reg text-body-reg text-on-surface-variant max-w-sm">

                </p>
</header>

<div class="flex flex-col gap-4">
<!-- Option: MetaMask -->
<button class="group w-full flex items-center justify-between p-5 bg-transparent border border-primary-container/30 hover:bg-primary-container transition-all duration-500 ease-out cursor-pointer relative overflow-hidden">

<span class="material-symbols-outlined text-primary group-hover:text-on-primary transition-colors duration-500">

                        </span>

<span class="material-symbols-outlined text-primary/50 group-hover:text-on-primary relative z-10 transition-colors duration-500">
